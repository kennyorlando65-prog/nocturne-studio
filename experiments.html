<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Systems Dashboard</title>

<link rel="stylesheet" href="css/systems.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2> SYSTEMS</h2>
    <ul>
      <li class="active">Analyzer</li>
      <li>Automation</li>
      <li>Logs</li>
      <li>Settings</li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <span class="status"><span class="dot"></span>System Active</span>
      <span id="time"></span>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat">
        <h3 id="totalRuns">0</h3>
        <p>Analyses Run</p>
      </div>
      <div class="stat">
        <h3>98%</h3>
        <p>Accuracy</p>
      </div>
      <div class="stat">
        <h3>Live</h3>
        <p>Status</p>
      </div>
    </div>

    <!-- TERMINAL -->
    <div class="terminal" id="terminal"></div>

    <!-- RESULT -->
    <div class="result" id="result">
      <h3>System Output</h3>
      <p>No analysis yet...</p>
    </div>

    <!-- INPUT -->
    <input id="userInput" type="text" placeholder="Enter text...">
    <button onclick="analyze()">Analyze</button>

  </main>

</div>

<script src="data/responses.js"></script>
<script src="js/systems.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
