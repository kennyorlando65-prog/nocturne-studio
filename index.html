<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOCTURNE STUDIO — Brand Identity & Web Design | Lagos </title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Syne:wght@400;700;800&family=DM+Mono&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#07070a;
  color:#f3efe6;
  font-family:'Playfair Display',serif;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:30px 60px;
  z-index:1000;
}
nav a{
  color:#aaa;
  text-decoration:none;
  margin-left:25px;
  font-family:'DM Mono';
}
nav a:hover{color:#fff}

/* HERO */
#hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-family:'Syne';
  font-size:70px;
  line-height:1;
}

.gold{color:#b8975a}

/* BUTTON */
.btn{
  margin-top:30px;
  display:inline-block;
  padding:14px 36px;
  background:#b8975a;
  color:#000;
  text-decoration:none;
  font-family:'DM Mono';
}

/* TRIAL BANNER */
#trialBanner{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
#trialBanner span{color:#b8975a}

/* PAYWALL */
#paywall{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#paywall.show{display:flex}

#paywall h2{
  font-family:'Syne';
  font-size:40px;
  color:#b8975a;
}

#paywall button{
  margin-top:20px;
  padding:15px 30px;
  background:#b8975a;
  border:none;
  cursor:pointer;
}

/* WHATSAPP */
.wa-btn{
  position:fixed;
  bottom:70px;
  right:25px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#25d366;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 20px rgba(37,211,102,.4);
}
.wa-btn svg{width:26px;fill:#fff}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>NOCTURNE</div>
  <div>
    <a href="#">Services</a>
    <a href="#">Work</a>
    <a href="experiments.html">Experiments</a>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero">
    <h1>
      We design <span class="gold">identity</span><br>
      that feels expensive
    </h1>

    <a href="#" class="btn" onclick="openPaywall()">Start Project</a>
  </div>
</section>

<!-- PAYWALL -->
<div id="paywall">
  <h2>Private Access</h2>
  <p>Premium clients only</p>
  <button onclick="closePaywall()">Close</button>
</div>

<!-- TRIAL BANNER -->
<div id="trialBanner">
  <div>System Active <span>●</span></div>
  <button onclick="openPaywall()">Upgrade</button>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/2347025689062" class="wa-btn" target="_blank">
  <svg viewBox="0 0 32 32">
    <path d="M16 .5C7.5.5.5 7.4.5 15.8c0 2.8.8 5.4 2.1 7.6L.5 31.5l8.4-2.1c2.1 1.2 4.5 1.9 7.1 1.9 8.5 0 15.5-6.9 15.5-15.3C31.5 7.4 24.5.5 16 .5z"/>
  </svg>
</a>

<!-- SCRIPT -->
<script>
function openPaywall(){
  document.getElementById("paywall").classList.add("show");
}

function closePaywall(){
  document.getElementById("paywall").classList.remove("show");
}
</script>

</body>
</html>
