<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nocturne Systems</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#07070a;
  color:#f3efe6;
  font-family:'Syne',sans-serif;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  padding:40px 20px;
  border-right:1px solid rgba(184,151,90,0.2);
}
.sidebar h2{
  color:#b8975a;
  letter-spacing:2px;
}
.sidebar ul{
  list-style:none;
  padding:0;
}
.sidebar li{
  margin:15px 0;
  color:#888;
}
.sidebar li.active{
  color:#b8975a;
}

/* MAIN */
.main{
  flex:1;
  padding:40px;
}

/* STATUS */
.status{
  color:#22c55e;
  margin-bottom:20px;
  font-family:'DM Mono', monospace;
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}
.card{
  background:#111116;
  padding:20px;
  border-radius:12px;
  flex:1;
}

/* TERMINAL */
.system-log{
  background:#000;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  font-family:'DM Mono', monospace;
  color:#0f0;
  min-height:100px;
}

/* OUTPUT */
.system-output{
  background:#111;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:15px;
  background:#0d0d12;
  border:1px solid rgba(184,151,90,0.2);
  color:#fff;
  margin-bottom:10px;
}

/* BUTTON */
button{
  background:#b8975a;
  border:none;
  padding:15px;
  width:100%;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>SYSTEMS</h2>
  <ul>
    <li class="active">Analyzer</li>
    <li>Automation</li>
    <li>Logs</li>
    <li>Settings</li>
  </ul>
</div>

<!-- MAIN -->
<div class="main">

  <div class="status">● System Active</div>

  <!-- STATS -->
  <div class="cards">
    <div class="card">
      <h3 id="analysesCount">0</h3>
      <p>Analyses Run</p>
    </div>

    <div class="card">
      <h3 id="accuracy">98%</h3>
      <p>Accuracy</p>
    </div>
  </div>

  <!-- TERMINAL -->
  <pre class="system-log">
> initializing systems...
> loading modules...
> system ready.
  </pre>

  <!-- OUTPUT -->
  <div class="system-output" id="output">
    No analysis yet...
  </div>

  <!-- INPUT -->
  <input type="text" placeholder="Enter text..." />

  <!-- BUTTON -->
  <button>Analyze</button>

</div>

<!-- CONNECT JS -->
<script src="systems.js"></script>

</body>
</html>
